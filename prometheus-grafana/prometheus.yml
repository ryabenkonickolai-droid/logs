global:
  scrape_interval: 1m

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'postgres_metrics' 
    static_configs:
      - targets: ['erp-dev01:9187']
        labels:
          instance: 'erp-dev01'
      - targets: ['erp01:9187']
        labels:
          instance: 'erp01'
      - targets: ['pgsql-erp01:9187']
        labels:
          instance: 'pgsql-erp01'
      - targets: ['pgsql-dev01:9187']
        labels:
          instance: 'pgsql-dev01'

  - job_name: 'pg_probackup'
    scrape_interval: 30s
    scrape_timeout: 30s
    scheme: http
    static_configs:
    - targets: ["pgsql-erp01:9899"]
      labels:
        "service": "postgres"
        "instance": "pgsql-erp01"
        "host": "pgsql-erp01"
        "Business_Critical": "Medium"
        "Team": "Postgres"


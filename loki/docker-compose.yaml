services:
  loki:
    image: grafana/loki:3.5.0
    user: "10001:10001"
    container_name: loki
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 1G
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml
      - /mnt/lun_monitoring02/loki:/tmp/loki
      - ./rules:/etc/loki/rules  
    command: -config.file=/etc/loki/loki-config.yaml
    networks: 
      - monitoring

volumes:
  loki-data:

networks:
  monitoring:
    external: true
